name: SleepRecord
options:
  bundleIdPrefix: io.github.ryoshumei.sleeprecord
  deploymentTarget:
    iOS: '26.4'
  developmentLanguage: ja
settings:
  base:
    SWIFT_VERSION: '5.9'
    DEVELOPMENT_TEAM: YFN535JPUP
    CODE_SIGN_STYLE: Automatic
    GENERATE_INFOPLIST_FILE: NO
    INFOPLIST_FILE: SleepRecord/Info.plist
    CODE_SIGN_ENTITLEMENTS: SleepRecord/SleepRecord.entitlements
    PRODUCT_BUNDLE_IDENTIFIER: io.github.ryoshumei.sleeprecord
    MARKETING_VERSION: '1.0.1'
    CURRENT_PROJECT_VERSION: '3'
    SUPPORTS_MACCATALYST: NO
    TARGETED_DEVICE_FAMILY: '1'
targets:
  SleepRecord:
    type: application
    platform: iOS
    sources:
      - path: SleepRecord
    settings:
      base:
        ENABLE_PREVIEWS: YES
        TARGETED_DEVICE_FAMILY: '1'
  SleepRecordTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: SleepRecordTests
    dependencies:
      - target: SleepRecord
    settings:
      base:
        BUNDLE_LOADER: $(TEST_HOST)
        TEST_HOST: $(BUILT_PRODUCTS_DIR)/SleepRecord.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/SleepRecord
schemes:
  SleepRecord:
    build:
      targets:
        SleepRecord: all
        SleepRecordTests: [test]
    test:
      targets:
        - SleepRecordTests
