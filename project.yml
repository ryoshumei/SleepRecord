name: SleepRecord
options:
  bundleIdPrefix: com.ryan.sleeprecord
  deploymentTarget:
    iOS: '17.0'
  developmentLanguage: ja
settings:
  base:
    SWIFT_VERSION: '5.9'
    DEVELOPMENT_TEAM: ''
    CODE_SIGN_STYLE: Automatic
    GENERATE_INFOPLIST_FILE: NO
    INFOPLIST_FILE: SleepRecord/Info.plist
    CODE_SIGN_ENTITLEMENTS: SleepRecord/SleepRecord.entitlements
    PRODUCT_BUNDLE_IDENTIFIER: com.ryan.sleeprecord
    SUPPORTS_MACCATALYST: NO
    TARGETED_DEVICE_FAMILY: '1'
targets:
  SleepRecord:
    type: application
    platform: iOS
    sources:
      - path: SleepRecord
    settings:
      base:
        ENABLE_PREVIEWS: YES
  SleepRecordTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: SleepRecordTests
    dependencies:
      - target: SleepRecord
    settings:
      base:
        BUNDLE_LOADER: $(TEST_HOST)
        TEST_HOST: $(BUILT_PRODUCTS_DIR)/SleepRecord.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/SleepRecord
schemes:
  SleepRecord:
    build:
      targets:
        SleepRecord: all
        SleepRecordTests: [test]
    test:
      targets:
        - SleepRecordTests
